<div class="modal-backdrop" (click)="close()">
    <div class="modal-box" (click)="$event.stopPropagation()">
        <div class="modal-header">
            <h2 class="modal-title">{{ task ? 'Edit Task' : 'New Task' }}</h2>
            <button class="modal-close" (click)="close()">×</button>
        </div>

        <div class="alert alert-error" *ngIf="error" style="margin-bottom:16px">{{ error }}</div>

        <form [formGroup]="form" (ngSubmit)="submit()">
            <div class="form-group" style="margin-bottom:14px">
                <label class="form-label">Title *</label>
                <input id="modal-title" class="form-control" type="text" formControlName="title"
                    placeholder="Task title">
            </div>

            <div class="form-group" style="margin-bottom:14px">
                <label class="form-label">Description</label>
                <textarea id="modal-desc" class="form-control" rows="3" formControlName="description"
                    placeholder="Optional description"></textarea>
            </div>

            <div class="grid-form" style="margin-bottom:14px">
                <div class="form-group">
                    <label class="form-label">Status</label>
                    <select id="modal-status" class="form-control" formControlName="status">
                        <option value="TODO">To Do</option>
                        <option value="IN_PROGRESS">In Progress</option>
                        <option value="DONE">Done</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Priority</label>
                    <select id="modal-priority" class="form-control" formControlName="priority">
                        <option value="LOW">Low</option>
                        <option value="MEDIUM">Medium</option>
                        <option value="HIGH">High</option>
                    </select>
                </div>
            </div>

            <div class="grid-form" style="margin-bottom:24px">
                <div class="form-group">
                    <label class="form-label">Due Date</label>
                    <input id="modal-due" class="form-control" type="date" formControlName="dueDate">
                </div>
                <div class="form-group" *ngIf="users.length > 0">
                    <label class="form-label">Assignee</label>
                    <select id="modal-assignee" class="form-control" formControlName="assigneeId">
                        <option [ngValue]="null">Unassigned</option>
                        <option *ngFor="let u of users" [ngValue]="u.id">{{ u.username }}</option>
                    </select>
                </div>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn btn-ghost" (click)="close()">Cancel</button>
                <button id="modal-submit" type="submit" class="btn btn-primary" [disabled]="loading || form.invalid">
                    {{ loading ? 'Saving...' : (task ? 'Update Task' : 'Create Task') }}
                </button>
            </div>
        </form>
    </div>
</div>
