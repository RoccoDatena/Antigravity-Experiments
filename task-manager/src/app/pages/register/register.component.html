<div class="auth-page">
    <div class="auth-card glass-card animate-in">
        <div class="auth-logo">⚡</div>
        <h1 class="auth-title">Create account</h1>
        <p class="auth-subtitle">Join TaskManager today</p>

        <div class="alert alert-error" *ngIf="error"><span>⚠</span> {{ error }}</div>
        <div class="alert alert-success" *ngIf="success"><span>✓</span> {{ success }}</div>

        <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input id="reg-username" class="form-control" type="text" formControlName="username"
                    placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input id="reg-email" class="form-control" type="email" formControlName="email"
                    placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input id="reg-password" class="form-control" type="password" formControlName="password"
                    placeholder="Min 6 characters">
            </div>
            <button id="reg-submit" class="btn btn-primary btn-full" type="submit" [disabled]="loading || !!success">
                {{ loading ? 'Creating...' : 'Create Account' }}
            </button>
        </form>

        <p class="auth-footer">
            Already have an account? <a routerLink="/login">Sign in</a>
        </p>
    </div>
</div>
