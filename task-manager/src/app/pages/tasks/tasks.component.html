<div class="page-container">
    <div class="page-header animate-in">
        <h1 class="page-title">Tasks</h1>
        <button id="btn-new-task" class="btn btn-primary" (click)="openCreate()">+ New Task</button>
    </div>

    <!-- Filters -->
    <div class="filters-bar glass-card animate-in">
        <input id="search-input" class="form-control search-input" type="text" placeholder="🔍 Search tasks..."
            [(ngModel)]="filterSearch" (input)="loadTasks()">
        <select id="filter-status" class="form-control filter-select" [(ngModel)]="filterStatus" (change)="loadTasks()">
            <option value="">All Status</option>
            <option value="TODO">To Do</option>
            <option value="IN_PROGRESS">In Progress</option>
            <option value="DONE">Done</option>
        </select>
        <select id="filter-priority" class="form-control filter-select" [(ngModel)]="filterPriority"
            (change)="loadTasks()">
            <option value="">All Priority</option>
            <option value="HIGH">High</option>
            <option value="MEDIUM">Medium</option>
            <option value="LOW">Low</option>
        </select>
        <button class="btn btn-ghost btn-sm" (click)="clearFilters()"
            *ngIf="filterStatus || filterPriority || filterSearch">
            Clear
        </button>
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="loading-center">
        <div class="spinner"></div>
    </div>

    <!-- Error -->
    <div *ngIf="error" class="alert alert-error">{{ error }}</div>

    <!-- Empty State -->
    <div *ngIf="!loading && tasks.length === 0" class="empty-state glass-card">
        <span>📭</span>
        <p>No tasks found</p>
        <button class="btn btn-primary" (click)="openCreate()">Create your first task</button>
    </div>

    <!-- Task Cards -->
    <div class="task-grid" *ngIf="!loading && tasks.length > 0">
        <div class="task-card glass-card animate-in" *ngFor="let task of tasks" [class.overdue]="isOverdue(task)">

            <div class="task-card-header">
                <div class="task-badges">
                    <span class="badge" [ngClass]="{
            'badge-todo': task.status === 'TODO',
            'badge-inprogress': task.status === 'IN_PROGRESS',
            'badge-done': task.status === 'DONE'
          }">{{ task.status === 'IN_PROGRESS' ? 'In Progress' : task.status }}</span>
                    <span class="badge" [ngClass]="{
            'badge-low': task.priority === 'LOW',
            'badge-medium': task.priority === 'MEDIUM',
            'badge-high': task.priority === 'HIGH'
          }">{{ task.priority }}</span>
                    <span class="overdue-tag" *ngIf="isOverdue(task)">⚠ Overdue</span>
                </div>
                <div class="task-actions">
                    <button class="btn btn-ghost btn-sm" (click)="openEdit(task)" title="Edit">✏</button>
                    <button class="btn btn-danger btn-sm" (click)="deleteTask(task.id)" title="Delete">🗑</button>
                </div>
            </div>

            <h3 class="task-title">{{ task.title }}</h3>
            <p class="task-desc" *ngIf="task.description">{{ task.description }}</p>

            <div class="task-meta">
                <span class="meta-item" *ngIf="task.dueDate">📅 {{ formatDate(task.dueDate) }}</span>
                <span class="meta-item">👤 {{ task.ownerUsername }}</span>
                <span class="meta-item" *ngIf="task.assigneeUsername">→ {{ task.assigneeUsername }}</span>
            </div>

            <!-- Quick Status Change -->
            <div class="quick-status" *ngIf="task.status !== 'DONE'">
                <button class="btn btn-success btn-sm" (click)="quickStatus(task, 'DONE')">✓ Mark Done</button>
                <button class="btn btn-ghost btn-sm" *ngIf="task.status === 'TODO'"
                    (click)="quickStatus(task, 'IN_PROGRESS')">▶ Start</button>
            </div>
        </div>
    </div>
</div>

<!-- Task Modal -->
<app-task-modal *ngIf="showModal" [task]="editingTask" (saved)="onModalSave()" (cancelled)="showModal = false">
</app-task-modal>
