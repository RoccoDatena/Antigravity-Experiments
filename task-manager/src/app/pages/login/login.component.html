<div class="auth-page">
    <div class="auth-card glass-card animate-in">
        <div class="auth-logo">⚡</div>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to your account</p>

        <div class="alert alert-error" *ngIf="error">
            <span>⚠</span> {{ error }}
        </div>

        <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input id="login-username" class="form-control" type="text" formControlName="username"
                    placeholder="Enter username" autocomplete="username">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input id="login-password" class="form-control" type="password" formControlName="password"
                    placeholder="Enter password" autocomplete="current-password">
            </div>
            <button id="login-submit" class="btn btn-primary btn-full" type="submit" [disabled]="loading">
                <span *ngIf="loading" class="spinner-sm"></span>
                <span>{{ loading ? 'Signing in...' : 'Sign In' }}</span>
            </button>
        </form>

        <p class="auth-footer">
            Don't have an account?
            <a routerLink="/register">Create one</a>
        </p>

        <div class="demo-creds">
            <p>Demo: <code>admin</code> / <code>password</code></p>
        </div>
    </div>
</div>
