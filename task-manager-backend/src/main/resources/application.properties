# Server
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:taskmanagerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
# In production override via: set JWT_SECRET=your-long-random-secret (Windows)
#                          or: export JWT_SECRET=your-long-random-secret (Linux/Mac)
app.jwt.secret=${JWT_SECRET:change-me-in-production-use-env-var-JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
app.cors.allowed-origins=http://localhost:4200
