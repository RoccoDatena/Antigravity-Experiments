name: Backend CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: task-manager-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: |
          mvn clean verify -B -DskipTests=false > maven_build_log.txt 2>&1 || (cat maven_build_log.txt && exit 1)

      - name: Upload compilation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-compilation-log
          path: task-manager-backend/maven_build_log.txt
          retention-days: 2

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: task-manager-backend/target/*.jar
          retention-days: 7
